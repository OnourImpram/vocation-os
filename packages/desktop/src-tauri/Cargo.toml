[package]
name = "vocation-os-desktop"
version = "0.6.0"
description = "Fail-closed bootstrap for the authenticated local VocationOS workbench"
authors = ["Onour Impram"]
license = "MIT"
repository = "https://github.com/OnourImpram/vocation-os"
edition = "2021"
rust-version = "1.77.2"
default-run = "vocation-os"

[lib]
name = "vocation_os_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "vocation-os"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "=2.6.3", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "=2.11.5", features = [] }

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
