name: desktop-native

on:
  pull_request:
    paths:
      - "packages/desktop/**"
      - "packages/workbench/**"
      - "src/cli.ts"
      - "src/vocationd.ts"
      - "src/daemon/**"
      - "src/workbench/**"
      - "test/unit/desktop-contract.test.ts"
      - "package-lock.json"
      - ".github/workflows/desktop-native.yml"
  push:
    branches:
      - main
    paths:
      - "packages/desktop/**"
      - "packages/workbench/**"
      - "src/cli.ts"
      - "src/vocationd.ts"
      - "src/daemon/**"
      - "src/workbench/**"
      - "test/unit/desktop-contract.test.ts"
      - "package-lock.json"
      - ".github/workflows/desktop-native.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-native-${{ github.ref }}
  cancel-in-progress: true

jobs:
  native-contract:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install JavaScript dependencies
        run: npm ci
      - name: Install Rust validation components
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt,clippy
          rustup default stable
      - name: Build and validate desktop package
        run: npm run build --workspace @vocation-os/desktop
      - name: Check Rust formatting
        run: cargo fmt --manifest-path packages/desktop/src-tauri/Cargo.toml -- --check
      - name: Run Rust tests
        run: cargo test --manifest-path packages/desktop/src-tauri/Cargo.toml --all-targets
      - name: Run Clippy
        run: cargo clippy --manifest-path packages/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
