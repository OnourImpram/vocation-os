name: release-evidence

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  verify:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run safe:publish-check
      - name: Build package archive
        run: npm pack
      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --package-lock-only > vocation-os.cdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: vocation-os-release-evidence
          if-no-files-found: error
          retention-days: 30
          path: |
            *.tgz
            vocation-os.cdx.json

  attest-and-publish:
    needs: verify
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: vocation-os-release-evidence
          path: release-evidence
      - name: Attest package provenance
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: "release-evidence/*.tgz"
      - name: Attest package SBOM
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: "release-evidence/*.tgz"
          sbom-path: release-evidence/vocation-os.cdx.json
      - name: Publish durable GitHub release evidence
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --title "VocationOS $GITHUB_REF_NAME" --generate-notes
          gh release upload "$GITHUB_REF_NAME" release-evidence/*.tgz release-evidence/vocation-os.cdx.json --repo "$GITHUB_REPOSITORY" --clobber
